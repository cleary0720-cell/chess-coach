<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Coach — Stats</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav>
  <a class="logo" href="index.html">♟ ChessCoach</a>
  <a href="index.html">Play</a>
  <a href="lessons.html">Lessons</a>
  <a href="history.html">History</a>
  <a href="stats.html" class="active">Stats</a>
</nav>

<div class="page">

  <!-- ELO + difficulty -->
  <div class="stats-grid" style="margin-bottom:24px">
    <div class="card stat-card">
      <div class="big-val" id="eloVal">—</div>
      <div style="font-size:14px;font-weight:600;margin-top:4px">Estimated ELO</div>
      <div class="sub" id="eloBasis">Play 3+ games to unlock</div>
      <div class="trend" id="eloTrend"></div>
    </div>
    <div class="card stat-card">
      <div class="big-val" id="accuracyVal">—</div>
      <div style="font-size:14px;font-weight:600;margin-top:4px">Avg Accuracy</div>
      <div class="sub" id="accuracySub">Last 10 games</div>
    </div>
    <div class="card stat-card">
      <div class="big-val" id="gamesVal">0</div>
      <div style="font-size:14px;font-weight:600;margin-top:4px">Games Played</div>
      <div class="sub" id="recordSub"></div>
    </div>
    <div class="card stat-card">
      <div class="big-val" style="font-size:28px" id="recDiffVal">—</div>
      <div style="font-size:14px;font-weight:600;margin-top:4px">Recommended Level</div>
      <div class="sub" id="recDiffSub"></div>
      <button class="btn btn-primary btn-sm" style="margin-top:10px" onclick="playRecommended()">Play This Level</button>
    </div>
  </div>

  <!-- Charts row -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px">
    <div class="card">
      <h3>Accuracy Over Time</h3>
      <canvas id="accuracyChart" height="160"></canvas>
      <div id="noAccuracyData" class="empty-state" style="display:none;padding:24px 0">
        <p>Play games to see your accuracy trend.</p>
      </div>
    </div>
    <div class="card">
      <h3>ELO Trend</h3>
      <canvas id="eloChart" height="160"></canvas>
      <div id="noEloData" class="empty-state" style="display:none;padding:24px 0">
        <p>Play 3+ games to see your ELO trend.</p>
      </div>
    </div>
  </div>

  <!-- Breakdown -->
  <div class="card">
    <h3>Move Quality Breakdown</h3>
    <div id="qualityBreakdown" style="display:flex;gap:24px;flex-wrap:wrap;padding:8px 0">
      <div class="empty-state" style="width:100%"><p>No game data yet.</p></div>
    </div>
  </div>

</div>

<script src="js/storage.js"></script>
<script src="js/stats.js"></script>
</body>
</html>
